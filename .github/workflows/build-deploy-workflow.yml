name: Deploy dan-plugin-skatteetaten

on:
 push:
   branches: [ main ]
   paths-ignore:
     - '**/README.md'
     - '**/*.yml'
 workflow_dispatch:
  inputs:
   commit_sha:
     description: 'Optional commit SHA to checkout (for re-runs)'
     required: false
     default: ''

permissions:
  actions: read
  contents: read
  checks: write
  pull-requests: write

jobs:
 run:
  uses: data-altinn-no/deploy-actions/.github/workflows/dan-deploy-flow.yml@61a7edd132ef73dbb446086d01ac0557dc28e258
  with:
    artifact_name: 'dan-plugin-skatteetaten' # Can be omitted, defaults to 'artifact'
    function_project_path: 'src/Dan.Plugin.Skatteetaten'
    dotnet_version: '10.0.x'
    run_e2e_tests: false
  secrets:
    function_app_name: ${{ secrets.FUNCTIONAPP_NAME }}
    publish_profile: ${{ secrets.AZURE_FUNCTION_PUBLISH_CREDS }}
    azure_artifact_pat: ${{ secrets.AZURE_ARTIFACTS_PAT }}
    azure_credentials: ${{ secrets.AZURE_CREDENTIALS }}
    resource_group_prod: ${{ secrets.RESOURCE_GROUP_PROD }}
